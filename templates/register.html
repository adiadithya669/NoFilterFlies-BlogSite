{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4 shadow-sm">
            <h3 class="card-title mb-3 text-center">Register</h3>
            {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
            <form method="POST" enctype="multipart/form-data" onsubmit="return validateForm()">
                {% csrf_token %}
                <input type="text" class="form-control mb-2" name="username" placeholder="Username" required>
                <input type="text" class="form-control mb-2" name="first_name" placeholder="First Name" required>
                <input type="text" class="form-control mb-2" name="last_name" placeholder="Last Name" required>
                <input type="email" class="form-control mb-2" name="email" placeholder="Email" required>
                <input type="text" class="form-control mb-2" name="contact" placeholder="Contact Number" pattern="[0-9]{10}" required>
                <input type="file" class="form-control mb-2" name="profile_pic">
                <input type="password" class="form-control mb-2" name="password" id="pwd" placeholder="Password" required minlength="6">
                <input type="password" class="form-control mb-2" id="cpwd" placeholder="Confirm Password" required>
                <button type="submit" class="btn btn-primary w-100">Register</button>
            </form>
        </div>
    </div>
</div>

<script>
function validateForm(){
    if(document.getElementById('pwd').value !== document.getElementById('cpwd').value){
        alert("Passwords do not match");
        return false;
    }
    return true;
}
</script>
{% endblock %}
