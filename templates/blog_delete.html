{% extends 'base.html' %}
{% block title %}Delete Blog{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow-sm p-4 text-center">
            <h3 class="text-danger">Are you sure you want to delete this blog?</h3>
            <h5 class="mt-3">{{ blog.title }}</h5>
            <form method="POST">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger mt-3 me-2">Yes, Delete</button>
                <a href="{% url 'blog_detail' blog.id %}" class="btn btn-secondary mt-3">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
