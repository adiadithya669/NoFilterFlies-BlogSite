{% extends 'base.html' %}
{% block title %}Create Blog{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-8">
        <div class="card shadow-sm p-4">
            <h3 class="card-title mb-3 text-center">New Blog Post</h3>
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <input type="text" name="title" class="form-control mb-2" placeholder="Blog Title" required>
                <textarea name="content" class="form-control mb-2" placeholder="Blog Content" rows="8" required></textarea>
                <input type="file" name="image" class="form-control mb-2">
                <button type="submit" class="btn btn-success w-100">Publish Blog</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
